controller:
  extraCreateMetadata: true
  k8sTagClusterId: e2e-param-test
  extraVolumeTags:
    TestKey: TestValue
  enableMetrics: true
  batching: true
  defaultFsType: xfs
  loggingFormat: json
  logLevel: 5
  userAgentExtra: e2e-test
  enablePrometheusAnnotations: true
  podDisruptionBudget:
    enabled: true
  sdkDebugLog: false
node:
  enableMetrics: true
  loggingFormat: json
  logLevel: 5
  kubeletPath: /var/lib/kubelet
  tolerateAllTaints: true
  reservedVolumeAttachments: 2
  hostNetwork: true
  serviceAccount:
    disableMutation: true
  terminationGracePeriodSeconds: 60
nodeAllocatableUpdatePeriodSeconds: 30
defaultStorageClass:
  enabled: true
storageClasses:
  - name: test-sc
    parameters:
      type: gp3
volumeSnapshotClasses:
  - name: test-vsc
    deletionPolicy: Delete
sidecars:
  provisioner:
    logLevel: 5
    leaderElection:
      enabled: true
  attacher:
    logLevel: 5
    leaderElection:
      enabled: true
  snapshotter:
    logLevel: 5
    forceEnable: true
  resizer:
    logLevel: 5
    leaderElection:
      enabled: true
  nodeDriverRegistrar:
    logLevel: 5
